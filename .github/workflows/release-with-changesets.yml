name: Release

on:
  push:
    branches:
      - main

jobs:
  test:
    if: |
      startsWith(github.repository, 'kubestellar/') &&
      (startsWith(github.event.commits[0].message, 'fix:') ||
      startsWith(github.event.commits[0].message, 'fix!:') ||
      startsWith(github.event.commits[0].message, 'feat:') ||
      startsWith(github.event.commits[0].message, 'chore(release):') ||
      startsWith(github.event.commits[0].message, 'feat!:'))
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test

  release:
    needs: [test]
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm ci
      - name: Install changelog
        run: npm install @changesets/changelog-git@0.2.0
      - name: Release
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          commit: "chore(release): release and bump versions of packages"
          title: "chore(release): release and bump versions of packages"
          publish: npm run release
          setupGitUser: false
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: kubestellar-bot
          GIT_AUTHOR_EMAIL: bot@kubestellar.io
          GIT_COMMITTER_NAME: kubestellar-bot
          GIT_COMMITTER_EMAIL: bot@kubestellar.io 